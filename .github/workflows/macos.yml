name: macOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  INSTALL_LOCATION: ${{ github.workspace }}/.local
  BUILD_TYPE: Release
  CTEST_OUTPUT_ON_FAILURE: 1
  PROJECT_NAME: ATLAS
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: Install dependencies
        run: |
          brew update
          brew install boost pkg-config libpq
          LIBPQ_PKGCONFIG_DIR="$(brew --prefix libpq)/lib/pkgconfig"
          echo "PKG_CONFIG_PATH=${LIBPQ_PKGCONFIG_DIR}${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_LOCATION \
            -D${PROJECT_NAME}_ENABLE_TESTING=ON \
            -D${PROJECT_NAME}_ENABLE_STANDALONE=ON

      - name: Build
        run: |
          J=$(sysctl -n hw.logicalcpu)
          if [ "$J" -gt 4 ]; then J=4; fi
          cmake --build build --config $BUILD_TYPE -j$J
          
      - name: Test
        run: ctest --test-dir build -C $BUILD_TYPE --output-on-failure

      - name: Install
        run: cmake --build build --target install --config $BUILD_TYPE
